server:
  port: 8080

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/asset_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always # DB schema will be initialized and IF NOT EXISTS will prevent loss
  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        model: qwen3-vl:8b

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000 # 24 hours in ms
    cookie-name: jwt_token
  init:
    admin-email: ${ADMIN_EMAIL:admin@asset.com}
    admin-password: ${ADMIN_PASSWORD:admin123}

logging:
  file:
    name: logs/app.log
  level:
    org.springframework.security: DEBUG
    com.assetmanagement.backend: DEBUG

