version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: asset-management-db
    env_file: .env
    environment:
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_DATABASE=asset_db
    ports:
      - "3306:3306"
    volumes:
      - asset-db-data:/var/lib/mysql
    networks:
      - asset-network
    restart: always

  backend:
    build: ./backend
    container_name: asset-management-backend
    env_file: .env
    environment:
      - DB_URL=jdbc:mysql://db:3306/asset_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-admin}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - asset-network
    restart: always

  frontend:
    build: ./frontend
    container_name: asset-management-frontend
    ports:
      - "5173:80"
    env_file: .env
    depends_on:
      - backend
    networks:
      - asset-network
    restart: always

networks:
  asset-network:
    driver: bridge

volumes:
  asset-db-data:
